name: Release Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: k8s-linux
    env:
      DOTNET_INSTALL_DIR: ${{ github.workspace }}/.dotnet
    strategy:
      fail-fast: false
      matrix:
        target: [net8.0, net10.0]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore test dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c release -f ${{ matrix.target }} --no-restore

  publish:
    runs-on: k8s-linux
    needs: build
    permissions:
      id-token: write   # mint the OIDC token for trusted publishing
      contents: read    # required for checkout once permissions are set explicitly
    env:
      DOTNET_INSTALL_DIR: ${{ github.workspace }}/.dotnet

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build NuGet Package
        run: dotnet pack -c Release -p:PackageVersion=${{ github.ref_name }}

      - name: Upload nuget package artifact
        uses: actions/upload-artifact@v7
        with:
          name: Nuget package
          path: "**/*.nupkg"

      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish NuGet Package
        run: dotnet nuget push "**/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
